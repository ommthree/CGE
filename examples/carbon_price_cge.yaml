# Engine 3 (cge_static): general-equilibrium carbon-price response.
# The static CGE builds a Social Accounting Matrix from the data build, calibrates to reproduce
# the benchmark exactly, then solves for the new equilibrium under the carbon price — reporting
# price, output (volume), factor-price and real-GDP changes with input substitution and
# factor-market feedback (the mechanism Engines 1-2 cannot capture).
# See docs/models/cge-static.md.
#
# NB: cge_static needs a data BUILD (it constructs the SAM from the IOSystem); it does not run on
# the built-in 'toy' fixture. Build one first, then point --data at its id:
#
#   cge build --test                                    # offline build
#   cge data                                            # copy the small build id
#   cge run --scenario examples/carbon_price_cge.yaml --data <small_build_id>
#
name: "Carbon price €50/t — general equilibrium (CGE), revenue recycled"
description: >
  A €50/tCO2 carbon price solved in general equilibrium: the SAM is built from the data build and
  the model re-solves with input substitution and factor markets clearing. The carbon revenue is
  recycled to the household (lump_sum), so the result shows the revenue-recycling effect and the
  reallocation from dirty to clean sectors — not just a smaller economy. Reports GE price/volume
  changes, factor prices, real GDP, welfare and carbon revenue. Pilot model (single region);
  indicative magnitudes; cross-checks Engines 1-2. A closed CGE cannot destroy revenue, so leaving
  revenue_recycling at the default 'none' auto-defaults to lump_sum (use Engine 1 for a pure
  price-side view).
engine: cge_static
years: [2020]
shocks:
  - type: carbon_price
    price: 50.0
    gases: [CO2]
    revenue_recycling: lump_sum   # none | lump_sum | labour_tax_cut
